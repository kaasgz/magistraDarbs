paths:
  features_csv: data/processed/features.csv
  benchmark_results_csv: data/results/benchmark_results.csv
  selection_dataset_csv: data/processed/selection_dataset.csv
  selection_dataset_run_summary: data/processed/selection_dataset_run_summary.json
  model_output: data/results/random_forest_selector.joblib
  feature_importance_csv: data/results/random_forest_feature_importance.csv
  training_run_summary: data/results/random_forest_selector_run_summary.json
  evaluation_report_csv: data/results/selector_evaluation.csv
  evaluation_summary_csv: data/results/selector_evaluation_summary.csv
  evaluation_summary_markdown: data/results/selector_evaluation_summary.md
  evaluation_run_summary: data/results/selector_evaluation_run_summary.json
  ablation_summary_csv: data/results/selector_ablation_summary.csv
  ablation_plot: data/results/selector_ablation_regret.png
  ablation_report_markdown: data/results/selector_ablation_summary.md
  ablation_run_summary: data/results/selector_ablation_run_summary.json
  error_analysis_output_dir: data/results/error_analysis
  error_analysis_run_summary: data/results/error_analysis_run_summary.json

run:
  random_seed: 42
  time_limit_seconds: 60

solvers:
  selected:
    - random_baseline
    - cpsat_solver
    - simulated_annealing_solver

split:
  strategy: repeated_stratified_kfold
  test_size: 0.25
  cross_validation_folds: 3
  repeats: 3

selector:
  model_choice: random_forest

dataset:
  include_solver_objectives: true
